  <!-- 👦 Anak Laki-laki Muslim (pake peci) -->
  <g transform="translate(350, 650)">
    <!-- Tangan/Lengan -->
    <path d="M -22 65 Q -45 55 -50 35" stroke="#A7F3D0" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M -22 65 Q -45 55 -50 35" stroke="#4A7C7A" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 22 65 Q 45 55 50 35" stroke="#A7F3D0" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M 22 65 Q 45 55 50 35" stroke="#4A7C7A" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Badan -->
    <rect x="-24" y="55" width="48" height="55" rx="10" fill="#A7F3D0" stroke="#4A7C7A" stroke-width="3"/>
    
    <!-- Kaki -->
    <path d="M -10 110 Q -15 130 -12 145" stroke="#172E40" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 10 110 Q 15 130 12 145" stroke="#172E40" stroke-width="6" stroke-linecap="round" fill="none"/>

    <!-- Kepala -->
    <circle cx="0" cy="35" r="30" fill="#FFE4E6" stroke="#172E40" stroke-width="3"/>
    <!-- Peci hitam -->
    <path d="M -26 22 Q -20 0 0 0 Q 20 0 26 22 Z" fill="#172E40" stroke="#172E40" stroke-width="3"/>
    
    <!-- Wajah senyum -->
    <path d="M -10 42 Q 0 55 10 42" stroke="#172E40" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="-10" cy="32" r="3.5" fill="#172E40"/>
    <circle cx="10" cy="32" r="3.5" fill="#172E40"/>
    <circle cx="-16" cy="38" r="4" fill="#FECACA" opacity="0.9"/>
    <circle cx="16" cy="38" r="4" fill="#FECACA" opacity="0.9"/>
  </g>

  <!-- 👧 Anak Perempuan Muslimah (berjilbab) -->
  <g transform="translate(680, 280)">
    <!-- Tangan/Lengan -->
    <path d="M -26 75 Q -45 60 -50 40" stroke="#FECACA" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M -26 75 Q -45 60 -50 40" stroke="#F87171" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 26 75 Q 45 60 50 40" stroke="#FECACA" stroke-width="9" stroke-linecap="round" fill="none"/>
    <path d="M 26 75 Q 45 60 50 40" stroke="#F87171" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Badan -->
    <path d="M -26 60 Q -32 75 -28 115 Q 0 125 28 115 Q 32 75 26 60 Z" fill="#FECACA" stroke="#F87171" stroke-width="3"/>
    
    <!-- Kaki -->
    <path d="M -10 115 Q -15 135 -12 150" stroke="#172E40" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 10 115 Q 15 135 12 150" stroke="#172E40" stroke-width="6" stroke-linecap="round" fill="none"/>

    <!-- Wajah belakang (agar jilbab di depan) -->
    <circle cx="0" cy="35" r="28" fill="#FFE4E6" stroke="#172E40" stroke-width="3"/>
    
    <!-- Jilbab biru -->
    <path d="M -28 28 Q -30 5 0 5 Q 30 5 28 28 Q 30 55 28 70 Q 0 75 -28 70 Q -30 55 -28 28 Z" fill="#BFDBFE" stroke="#60A5FA" stroke-width="3"/>
    
    <!-- Wajah lubang jilbab (wajah dalam) -->
    <circle cx="0" cy="35" r="22" fill="#FFE4E6" stroke="none"/>
    
    <!-- Wajah senyum -->
    <path d="M -10 42 Q 0 55 10 42" stroke="#172E40" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="-10" cy="32" r="3.5" fill="#172E40"/>
    <circle cx="10" cy="32" r="3.5" fill="#172E40"/>
    <circle cx="-14" cy="38" r="4" fill="#F87171" opacity="0.7"/>
    <circle cx="14" cy="38" r="4" fill="#F87171" opacity="0.7"/>
