    <path d="M -40 -30 L 0 20" stroke="#4A7C7A" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 50 15 Q 45 13 40 10" stroke="#4A7C7A" stroke-width="2" stroke-linecap="round"/>
    <path d="M 58 22 Q 53 20 48 17" stroke="#4A7C7A" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- 🌸 Bunga diisi warna -->
  <g transform="translate(250, 450)">
    <circle cx="0" cy="-15" r="13" fill="#FECACA" stroke="#F87171" stroke-width="2.5"/>
    <circle cx="14" cy="-5" r="13" fill="#FECACA" stroke="#F87171" stroke-width="2.5"/>
    <circle cx="9" cy="11" r="13" fill="#FECACA" stroke="#F87171" stroke-width="2.5"/>
    <circle cx="-9" cy="11" r="13" fill="#FECACA" stroke="#F87171" stroke-width="2.5"/>
    <circle cx="-14" cy="-5" r="13" fill="#FECACA" stroke="#F87171" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="8" fill="#FDE68A" stroke="#C89B53" stroke-width="2.5"/>
  </g>

  <g transform="translate(680, 850)">
    <circle cx="0" cy="-15" r="13" fill="#BFDBFE" stroke="#60A5FA" stroke-width="2.5"/>
    <circle cx="14" cy="-5" r="13" fill="#BFDBFE" stroke="#60A5FA" stroke-width="2.5"/>
    <circle cx="9" cy="11" r="13" fill="#BFDBFE" stroke="#60A5FA" stroke-width="2.5"/>
    <circle cx="-9" cy="11" r="13" fill="#BFDBFE" stroke="#60A5FA" stroke-width="2.5"/>
    <circle cx="-14" cy="-5" r="13" fill="#BFDBFE" stroke="#60A5FA" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="8" fill="#FDE68A" stroke="#C89B53" stroke-width="2.5"/>
  </g>

  <!-- ❤ Hati Merah muda -->
  <g fill="#FECACA" stroke="#F87171" stroke-width="2.5">
    <path d="M 600 400 Q 600 385 615 385 Q 630 385 630 400 Q 630 415 600 435 Q 570 415 570 400 Q 570 385 585 385 Q 600 385 600 400 Z" />
    <path d="M 150 300 Q 150 290 160 290 Q 170 290 170 300 Q 170 310 150 325 Q 130 310 130 300 Q 130 290 140 290 Q 150 290 150 300 Z" />
  </g>

  <!-- 🎈 Balon -->
  <g transform="translate(850, 700)">
    <ellipse cx="0" cy="0" rx="25" ry="32" fill="#BFDBFE" stroke="#60A5FA" stroke-width="3"/>
    <path d="M 0 32 Q -5 50 10 65" stroke="#60A5FA" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>
  <g transform="translate(300, 200)">
