    <line x1="0" y1="-45" x2="0" y2="-60" stroke="#C89B53" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="45" x2="0" y2="60" stroke="#C89B53" stroke-width="4" stroke-linecap="round"/>
    <line x1="-45" y1="0" x2="-60" y2="0" stroke="#C89B53" stroke-width="4" stroke-linecap="round"/>
    <line x1="45" y1="0" x2="60" y2="0" stroke="#C89B53" stroke-width="4" stroke-linecap="round"/>
    <line x1="32" y1="-32" x2="42" y2="-42" stroke="#C89B53" stroke-width="4" stroke-linecap="round"/>
    <line x1="-32" y1="32" x2="-42" y2="42" stroke="#C89B53" stroke-width="4" stroke-linecap="round"/>
    <line x1="-32" y1="-32" x2="-42" y2="-42" stroke="#C89B53" stroke-width="4" stroke-linecap="round"/>
    <line x1="32" y1="32" x2="42" y2="42" stroke="#C89B53" stroke-width="4" stroke-linecap="round"/>
