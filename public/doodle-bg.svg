    <path d="M -64 0 A 64 64 0 0 1 64 0" stroke="#A7F3D0" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M -48 0 A 48 48 0 0 1 48 0" stroke="#FECACA" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M -32 0 A 32 32 0 0 1 32 0" stroke="#BFDBFE" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Awan -->
    <path d="M -90 0 Q -90 -20 -70 -20 Q -60 -35 -40 -20 Q -20 -15 -30 5 Q -90 10 -90 0 Z" fill="#FFFFFF" stroke="#4A7C7A" stroke-width="3"/>
    <path d="M 90 0 Q 90 -20 70 -20 Q 60 -35 40 -20 Q 20 -15 30 5 Q 90 10 90 0 Z" fill="#FFFFFF" stroke="#4A7C7A" stroke-width="3"/>
  </g>

  <!-- 🌙 Bulan Sabit (Islami) -->
  <path d="M 600 80 Q 560 110 580 150 Q 540 120 540 85 Q 540 50 600 80 Z" fill="#FDE68A" stroke="#C89B53" stroke-width="3" stroke-linejoin="round"/>
  <path d="M 250 820 Q 210 850 230 890 Q 190 860 190 825 Q 190 790 250 820 Z" fill="#FDE68A" stroke="#C89B53" stroke-width="3" stroke-linejoin="round"/>

  <!-- ⭐ Bintang kuning isi -->
  <g fill="#FDE68A" stroke="#C89B53" stroke-width="2.5" stroke-linejoin="round">
    <polygon points="400,150 405,165 420,165 408,175 412,190 400,180 388,190 392,175 380,165 395,165" />
    <polygon points="900,100 903,110 915,110 906,117 909,128 900,120 891,128 894,117 885,110 897,110" />
    <polygon points="120,600 123,610 135,610 126,617 129,628 120,620 111,628 114,617 105,610 117,610" />
    <polygon points="800,800 804,814 819,814 807,824 811,839 799,829 787,839 791,824 779,814 794,814" />
    <polygon points="500,450 503,460 515,460 506,467 509,478 500,470 491,478 494,467 485,460 497,460" />
  </g>
  
  <!-- 📖 Buku (Quran) -->
  <g transform="translate(800, 500)">
    <rect x="-25" y="-30" width="50" height="60" rx="5" fill="#A7F3D0" stroke="#4A7C7A" stroke-width="3"/>
    <rect x="-18" y="-22" width="36" height="44" rx="3" fill="#FFFFFF" stroke="#4A7C7A" stroke-width="2"/>
    <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#4A7C7A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#4A7C7A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-10" y1="10" x2="5" y2="10" stroke="#4A7C7A" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -5 -30 L -5 0" stroke="#C89B53" stroke-width="5"/> <!-- penanda buku -->
